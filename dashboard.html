<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div class="navbar bg-base-100 shadow-sm flex justify-between px-4">
        <div class="flex items-center gap-2">
            <div class="w-10 rounded-full">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <a href="#">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto pl-12 text-[#64748B] focus:outline-none" />
                <div class="absolute top-2 left-1 pl-4">
                    <i class="fa-solid fa-magnifying-glass" style="color: #64748b;"></i>
                </div>
            </div>
            <div class="btn btn-primary">
                <button><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </div>
    <section >
        <div class="flex gap-2 bg-base-100 shadow-sm p-6 mt-15 mx-20 lg:mx-52 rounded-lg">
            <button class="btn">All</button>
            <button class="btn">Open</button>
            <button class="btn">Closed</button>
        </div>
        <div class="flex justify-between items-center bg-base-100 shadow-sm p-6 my-4 mx-20 lg:mx-52 rounded-lg">
            <div class="flex">
                <div class="p-[10px] w-12 h-12 bg-[#ECE4FF] rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                    
                </div>
                <div class="">
                    <h2>50 Issues</h2>
                    <p class="">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex justify-center items-center gap-3">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span><span>Open</span> 
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span> <span>Closed</span>
            </div>
        </div>

        <div class="bg-[#FBFBFB] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 my-4 gap-6 mx-20 lg:mx-52" id="card">

        </div>
    </section>



    <script src="./scripts/dashboard.js"></script>
</body>
</html>
